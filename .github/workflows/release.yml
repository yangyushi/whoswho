name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v0.2.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: wsw-linux-x86_64
            binary: wsw
          - os: macos-latest
            artifact: wsw-macos-x86_64
            binary: wsw
          - os: windows-latest
            artifact: wsw-windows-x86_64
            binary: wsw.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Install stable Rust
        shell: bash
        run: |
          rustup update stable
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Test
        run: cargo test

      - name: Build
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $binary = "target/release/${{ matrix.binary }}"
          Copy-Item $binary "dist/${{ matrix.binary }}"
          Copy-Item README.md dist/
          Copy-Item CHANGELOG.md dist/
          if ("${{ runner.os }}" -eq "Windows") {
            Compress-Archive -Path dist/* -DestinationPath "${{ matrix.artifact }}.zip"
          } else {
            tar -czf "${{ matrix.artifact }}.tar.gz" -C dist .
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            *.zip
            *.tar.gz

  publish:
    name: publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $version = $tag.TrimStart("v")
          ./scripts/changelog-notes.ps1 -Version $version -OutputPath release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "$tag" \
              --notes-file release-notes.md
            gh release upload "$tag" artifacts/* --clobber
          else
            gh release create "$tag" artifacts/* \
              --title "$tag" \
              --notes-file release-notes.md \
              --verify-tag
          fi
